<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESS Calculator</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color:white;
    overflow-x:hidden;
}

.container {
    max-width:700px;
    margin:auto;
    padding:20px;
}

.step {
    display:none;
    animation:fade 0.6s ease;
}

.step.active { display:block; }

@keyframes fade {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1;}
}

button {
    background:linear-gradient(90deg,#00f0ff,#00ffa3);
    border:none;
    padding:14px;
    margin:6px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover { transform:scale(1.05); }

input, select {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

.progress {
    height:4px;
    background:#1e293b;
}

.progress-bar {
    height:4px;
    width:0%;
    background:linear-gradient(90deg,#00f0ff,#00ffa3);
    transition:0.4s;
}

.energy-flow {
    height:4px;
    background:linear-gradient(90deg, transparent, #00f0ff, transparent);
    animation:flow 2s infinite;
}

@keyframes flow {
    0% {background-position:-200px;}
    100% {background-position:200px;}
}

.result {
    background:#020617;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 30px rgba(0,255,200,0.1);
}

.highlight {
    color:#00ffa3;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="energy-flow"></div>

<div class="container">

<div class="progress"><div class="progress-bar" id="bar"></div></div>

<div class="step active">
<h2>Где используется энергия?</h2>
<button onclick="next()">Дом</button>
<button onclick="next()">Бизнес</button>
<button onclick="next()">Производство</button>
</div>

<div class="step">
<h2>Пиковая нагрузка (кВт)</h2>
<input type="number" id="power" placeholder="например 5">
<p>Мы учтем запас мощности и срок службы оборудования</p>
<button onclick="next()">Далее</button>
</div>

<div class="step">
<h2>Автономность</h2>
<button onclick="setAuto(3)">2–4 часа</button>
<button onclick="setAuto(6)">4–8 часов</button>
<button onclick="setAuto(12)">8–24 часа</button>
</div>

<div class="step">
<h2>Анализ системы...</h2>
<p>⚡ Проверяем нагрузку батарей</p>
<p>⚡ Подбираем инвертор</p>
<p>⚡ Оптимизируем ресурс системы</p>
</div>

<div class="step">
<h2>Результат</h2>
<div class="result" id="result"></div>

<br>

<h3>Ваши потери без системы</h3>
<input type="range" min="200" max="5000" value="500" id="loss">
<p><span id="lossVal">500</span> грн/час</p>

<br>

<button onclick="sendLead()">Получить точный расчет</button>

</div>

</div>

<script>

let step=0;
let autonomy=0;

const LV=[6,12,15,17.5,33.3];
const HV=[141,172,193,386];

function next(){
    document.querySelectorAll('.step')[step].classList.remove('active');
    step++;
    document.querySelectorAll('.step')[step].classList.add('active');
    document.getElementById('bar').style.width=(step*25)+'%';

    if(step==3){
        setTimeout(()=>{
            calculate();
            next();
        },2000);
    }
}

function setAuto(a){
    autonomy=a;
    next();
}

document.getElementById('loss').oninput=function(){
    lossVal.innerText=this.value;
}

function calculate(){

    let power=parseFloat(powerInput.value)||5;

    let inv=power*1.25;
    let energy=power*autonomy;

    let type = energy>100?'HV':'LV';
    let pool = type==='HV'?HV:LV;

    let total=0;
    let config=[];

    for(let i=pool.length-1;i>=0;i--){
        while(total<energy){
            total+=pool[i];
            config.push(pool[i]);
        }
    }

    let c=power/total;

    if(c>0.4){
        total*=1.3;
    }

    let invType="";
    if(inv<=10) invType="однофазный";
    else if(inv<=20) invType="трехфазный";
    else if(inv<=80) invType="промышленный";
    else invType="параллельная система";

    result.innerHTML=`
    <p>Инвертор: <span class="highlight">${inv.toFixed(1)} кВт</span></p>
    <p>${invType}</p>

    <hr>

    <p>ESS: <span class="highlight">${total.toFixed(1)} кВт·ч</span></p>
    <p>${config.join(" + ")}</p>

    <hr>

    <p>Нагрузка батарей: ${(c).toFixed(2)}C</p>

    <p>Мы автоматически оптимизировали систему для увеличения ресурса батарей.</p>
    `;
}

function sendLead(){
    let msg="Хочу расчет ESS";
    window.open(`https://t.me/yourusername?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
